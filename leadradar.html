<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadRadar — Walter Workflows</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230C1626'/><path d='M18 24L34 78L50 42L66 78L82 24' fill='none' stroke='%235FA0DC' stroke-width='14' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
/* ════════════════════════════════════════════════
   WALTER WORKFLOWS · LeadRadar v3
   Ländescan in Sektoren · Potenzial-Ranking · stoppbar
════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#2F6DA8;--sky:#5FA0DC;--mid:#1F4A77;--navy:#142B47;
  --bg:#070F1A;--panel:#0C1828;--panel2:#112238;--line:#1B3050;--line2:#264260;
  --txt:#E6EEF7;--sub:#8DA2BC;--faint:#5F7590;
  --gA:#3DDC97;--gB:#5FA0DC;--gC:#8DA2BC;
  --red:#E07856;
  --grad:linear-gradient(120deg,#2F6DA8,#142B47);
  --gradup:linear-gradient(120deg,#5FA0DC,#2F6DA8);
  --head:"Manrope",sans-serif;--text:"Inter",sans-serif;
  --ez:cubic-bezier(.19,1,.22,1);
}
html,body{height:100%}
body{font-family:var(--text);background:var(--bg);color:var(--txt);font-size:14px;overflow:hidden;
  -webkit-font-smoothing:antialiased}
::selection{background:var(--blue);color:#fff}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}
.ic{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:none}

.app{display:grid;grid-template-rows:68px 1fr;height:100vh}
.main{display:grid;grid-template-columns:490px 1fr;min-height:0}
@media(max-width:900px){.main{grid-template-columns:1fr}.side{display:none}}

/* ── Topbar ── */
.top{display:flex;align-items:center;gap:18px;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--line);position:relative;z-index:10}
.logo{display:flex;align-items:center;gap:12px}
.logo svg{width:33px;height:33px}
.logo .t{display:flex;flex-direction:column;line-height:1}
.logo .t b{font-family:var(--head);font-weight:800;font-size:13.5px;letter-spacing:.1em;color:#fff}
.logo .t small{font-size:8px;font-weight:600;letter-spacing:.28em;color:var(--faint);margin-top:4px;text-transform:uppercase}
.top .divider{width:1px;height:28px;background:var(--line)}
.toolname{font-family:var(--head);font-weight:800;font-size:17px;
  background:var(--gradup);-webkit-background-clip:text;background-clip:text;color:transparent}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.stat-pill{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--sub);
  background:var(--panel2);border:1px solid var(--line);padding:7px 14px;border-radius:999px}
.stat-pill b{color:#fff;font-variant-numeric:tabular-nums;font-family:var(--head);font-size:14px}
.stat-pill.hl b{color:var(--sky)}

/* ── Sidebar ── */
.side{display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--line);min-height:0}
.sect-h{display:flex;align-items:center;gap:10px;font-size:10.5px;font-weight:800;letter-spacing:.2em;
  text-transform:uppercase;color:var(--faint);padding:22px 24px 0}
.sect-h::after{content:"";flex:1;height:1px;background:var(--line)}
.controls{padding:16px 24px 24px;border-bottom:1px solid var(--line);display:grid;gap:16px}
.fld label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
select,input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:12px;
  color:var(--txt);font-family:var(--text);font-size:14px;padding:13px 15px;outline:0;transition:border-color .2s}
select:focus,input[type=text]:focus{border-color:var(--sky)}
select option,select optgroup{background:var(--panel2)}
.opts{display:grid;gap:11px;padding:2px 2px 0}
.opt{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--sub);user-select:none;cursor:pointer;line-height:1.4}
.opt input{width:16px;height:16px;accent-color:var(--sky);flex:none}
.scanbtn{position:relative;width:100%;border:0;border-radius:14px;padding:17px;font-family:var(--head);margin-top:2px;
  font-weight:800;font-size:15px;color:#fff;background:var(--grad);overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 8px 26px rgba(47,109,168,.3);
  transition:transform .3s var(--ez),box-shadow .3s var(--ez),background .3s}
.scanbtn:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(47,109,168,.4)}
.scanbtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.scanbtn.stop{background:linear-gradient(120deg,#8A4634,#5E2E22)}
.scanbtn .sweepline{position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);
  transform:translateX(-100%)}
.scanbtn.scanning .sweepline{animation:sweep 1.4s linear infinite}
@keyframes sweep{to{transform:translateX(100%)}}

/* Fortschritt */
.scanmeta{display:none;padding:0 24px 16px;border-bottom:1px solid var(--line)}
.scanmeta.on{display:block}
.sm-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--sub);margin-bottom:7px}
.sm-row b{color:var(--sky);font-variant-numeric:tabular-nums}
.bar{height:5px;background:var(--panel2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;width:0;background:var(--gradup);border-radius:99px;transition:width .5s var(--ez)}

.status{padding:14px 24px;font-size:12.5px;color:var(--sub);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;min-height:48px;line-height:1.5}
.status .spin{width:13px;height:13px;border:2px solid var(--line2);border-top-color:var(--sky);border-radius:50%;
  animation:rot .8s linear infinite;display:none;flex:none}
.status.busy .spin{display:block}
@keyframes rot{to{transform:rotate(360deg)}}

.search{padding:16px 24px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
.search input{background:var(--panel2)}
.sortlbl{font-size:10.5px;color:var(--faint);white-space:nowrap;display:flex;align-items:center;gap:5px}
.sortlbl svg{width:13px;height:13px;stroke:var(--sky)}

/* Liste */
.list{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
.list::-webkit-scrollbar{width:8px}
.list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.empty{padding:48px 28px;text-align:center;color:var(--faint);font-size:13px;line-height:1.75}
.empty svg{width:46px;height:46px;margin:0 auto 16px;stroke:var(--line2);fill:none;stroke-width:1.4;stroke-linecap:round}
.lead{margin:12px 20px;padding:18px 20px;background:var(--panel2);border:1px solid var(--line);
  border-radius:16px;cursor:pointer;position:relative;
  transition:border-color .25s,transform .25s var(--ez),box-shadow .25s;animation:pop .4s var(--ez) both}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.lead:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.3)}
.lead.active{border-color:var(--sky);box-shadow:0 0 0 1px var(--sky)}
.lead .top-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding-right:78px}
.lead .nm{font-family:var(--head);font-weight:700;font-size:14.5px;color:#fff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pot{flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;
  width:24px;height:24px;border-radius:8px;font-family:var(--head)}
.pot.A{color:#06231A;background:var(--gA)}
.pot.B{color:#07182B;background:var(--gB)}
.pot.C{color:#0B1424;background:var(--gC)}
.lead .ad{font-size:12.5px;color:var(--sub);margin-bottom:12px;line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lead .tags{display:flex;flex-wrap:wrap;gap:7px}
.tg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:8px;
  background:var(--panel);border:1px solid var(--line2);color:var(--sub)}
.tg svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tg.ok{color:#A9C8E8;border-color:rgba(95,160,220,.35);background:rgba(95,160,220,.08)}
.mailquick{cursor:pointer;transition:.2s;margin-left:auto}
.mailquick:hover{color:#fff;border-color:var(--sky);background:rgba(95,160,220,.25)}
.lead .mark{position:absolute;top:16px;right:16px;font-size:10.5px;font-weight:700;
  padding:5px 11px;border-radius:8px;border:1px solid var(--line2);color:var(--faint);background:var(--panel);transition:.2s}
.lead .mark.done{color:#06231A;border-color:transparent;background:var(--gA)}
.more-hint{padding:16px 24px 22px;text-align:center;font-size:12px;color:var(--faint)}

.side-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:12px}
.ghostbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--panel2);border:1px solid var(--line2);color:var(--sub);border-radius:10px;
  padding:10px;font-size:12.5px;font-weight:600;transition:.25s}
.ghostbtn:hover{color:#fff;border-color:var(--sky)}

/* ── Karte ── */
.maparea{position:relative;min-height:0;overflow:hidden}
#map{position:absolute;inset:0;background:#070F1A}
.leaflet-container{font-family:var(--text)}
.leaflet-popup-content-wrapper{background:var(--panel);color:var(--txt);border-radius:14px;border:1px solid var(--line2);
  box-shadow:0 20px 50px rgba(0,0,0,.55)}
.leaflet-popup-tip{background:var(--panel);border:1px solid var(--line2)}
.leaflet-popup-content{margin:16px 18px;font-size:13px;line-height:1.6}
.pop-nm{font-family:var(--head);font-weight:800;font-size:15px;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pop-ad{color:var(--sub);font-size:12px;margin-bottom:10px}
.pop-row{display:flex;align-items:center;gap:8px;padding:5px 0;color:var(--txt);font-size:12.5px}
.pop-row svg{width:14px;height:14px;flex:none;stroke:var(--sky);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pop-row a{color:var(--sky);text-decoration:underline;word-break:break-all}
.pop-pot{font-size:11.5px;color:var(--sub);background:var(--panel2);border:1px solid var(--line2);
  border-radius:8px;padding:8px 11px;margin:8px 0 4px;line-height:1.5}
.pop-pot b{color:#fff}
.pop-mail{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;
  background:var(--grad);color:#fff;border:0;border-radius:10px;padding:11px;
  font-family:var(--head);font-weight:700;font-size:13px;transition:transform .25s var(--ez),box-shadow .25s}
.pop-mail:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(47,109,168,.4)}
.pop-mail svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.leaflet-popup-close-button{color:var(--faint)!important}

/* ═══ BLAUES RADAR ═══ */
.radar-stage{position:absolute;inset:0;pointer-events:none;z-index:600;display:none}
.radar-stage.on{display:block}
.radar{position:absolute;border-radius:50%;
  border:1.5px solid rgba(95,160,220,.4);
  box-shadow:0 0 70px rgba(47,109,168,.12) inset}
.radar::before{content:"";position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,transparent 0 32%,rgba(95,160,220,.22) 32.5% 33%,transparent 33.5% 65%,rgba(95,160,220,.22) 65.5% 66%,transparent 66.5%)}
.radar .cross-h{position:absolute;left:0;top:50%;width:100%;height:1px;background:rgba(95,160,220,.16)}
.radar .cross-v{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(95,160,220,.16)}
.radar .beam{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(95,160,220,.5) 0deg,rgba(95,160,220,.18) 35deg,transparent 75deg);
  animation:spinbeam 2.6s linear infinite}
@keyframes spinbeam{to{transform:rotate(360deg)}}
.radar .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(95,160,220,.45);
  animation:ringpulse 2.4s var(--ez) infinite}
@keyframes ringpulse{from{transform:scale(.2);opacity:.9}to{transform:scale(1);opacity:0}}
.radar .core{position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px;border-radius:50%;
  background:var(--sky);box-shadow:0 0 14px rgba(95,160,220,.8)}

/* HUD */
.map-hud{position:absolute;top:16px;right:16px;z-index:700;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.hud-chip{background:rgba(12,24,40,.92);backdrop-filter:blur(8px);border:1px solid var(--line2);border-radius:12px;
  padding:10px 16px;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:10px}
.hud-chip b{color:#fff;font-variant-numeric:tabular-nums;font-size:15px;font-family:var(--head)}
.hud-scan{display:none;background:rgba(10,22,38,.94);border:1px solid rgba(95,160,220,.4);border-radius:12px;
  padding:10px 16px;font-size:12px;color:#A9C8E8;align-items:center;gap:10px}
.hud-scan.on{display:flex}
.hud-scan .sp{width:11px;height:11px;border:2px solid rgba(95,160,220,.3);border-top-color:var(--sky);border-radius:50%;animation:rot .7s linear infinite}

/* Legende */
.legend{position:absolute;bottom:22px;right:16px;z-index:700;background:rgba(12,24,40,.92);border:1px solid var(--line2);
  border-radius:12px;padding:12px 16px;font-size:11.5px;color:var(--sub);display:grid;gap:7px}
.legend b{color:#fff;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.lg-row{display:flex;align-items:center;gap:9px}
.lg-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid #fff}

.toast{position:fixed;bottom:22px;left:50%;transform:translate(-50%,120px);z-index:900;background:var(--panel);
  border:1px solid var(--line2);border-radius:12px;padding:13px 22px;font-size:13px;color:var(--txt);
  box-shadow:0 20px 50px rgba(0,0,0,.55);transition:transform .5s var(--ez)}
.toast.show{transform:translate(-50%,0)}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <span class="logo">
      <svg viewBox="0 0 100 100"><defs><linearGradient id="lw" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#5FA0DC"/><stop offset="1" stop-color="#2F6DA8"/></linearGradient></defs>
        <path d="M14 22L33 80L50 42L67 80L86 22" fill="none" stroke="url(#lw)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="t"><b>WALTER WORKFLOWS</b><small>Internes Tool</small></span>
    </span>
    <span class="divider"></span>
    <span class="toolname">LeadRadar</span>
    <div class="top-right">
      <span class="stat-pill hl">Leads: <b id="totalCount">0</b></span>
      <span class="stat-pill">Top-Potenzial: <b id="aCount">0</b></span>
      <span class="stat-pill">Kontaktiert: <b id="doneCount">0</b></span>
    </div>
  </header>

  <div class="main">
    <aside class="side">
      <div class="sect-h">Scan</div>
      <div class="controls">
        <div class="fld">
          <label for="selRegion">Scan-Gebiet</label>
          <select id="selRegion">
            <option value="CC:CH:Schweiz" selected>Ganze Schweiz</option>
            <option value="CC:DE:Deutschland">Ganz Deutschland</option>
            <optgroup label="Einzelne Städte">
              <option value="47.3769,8.5417,Zürich">Zürich (25 km)</option>
              <option value="47.5596,7.5886,Basel">Basel (25 km)</option>
              <option value="46.9480,7.4474,Bern">Bern (25 km)</option>
              <option value="46.2044,6.1432,Genf">Genf (25 km)</option>
              <option value="48.1351,11.5820,München">München (30 km)</option>
              <option value="50.1109,8.6821,Frankfurt">Frankfurt (30 km)</option>
              <option value="53.5511,9.9937,Hamburg">Hamburg (30 km)</option>
              <option value="52.5200,13.4050,Berlin">Berlin (30 km)</option>
            </optgroup>
          </select>
        </div>
        <div class="opts">
          <label class="opt"><input type="checkbox" id="chkSmall" checked>Grosse Ketten &amp; Banken ausblenden</label>
          <label class="opt"><input type="checkbox" id="chkContact">Nur Leads mit Kontaktdaten übernehmen</label>
        </div>
        <button class="scanbtn" id="btnScan">
          <span class="sweepline"></span>
          <svg id="btnIco" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 12L18 7"/><circle cx="12" cy="12" r="1" fill="#fff"/></svg>
          <span id="btnTxt">Scan starten</span>
        </button>
      </div>
      <div class="scanmeta" id="scanmeta">
        <div class="sm-row"><span id="smLabel">Sektor —</span><b id="smPct">0%</b></div>
        <div class="bar"><i id="smBar"></i></div>
      </div>
      <div class="status" id="status"><span class="spin"></span><span id="statusTxt">Bereit. Gebiet wählen und Scan starten.</span></div>
      <div class="sect-h" style="padding-top:18px">Ergebnisse</div>
      <div class="search">
        <input type="text" id="q" placeholder="Leads durchsuchen (Name, Ort) …">
        <span class="sortlbl"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>nach Potenzial</span>
      </div>
      <div class="list" id="list"></div>
      <div class="side-foot">
        <button class="ghostbtn" id="btnCsv"><svg class="ic" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M4 21h16"/></svg>CSV exportieren</button>
        <button class="ghostbtn" id="btnClear"><svg class="ic" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>Liste leeren</button>
      </div>
    </aside>

    <div class="maparea">
      <div id="map"></div>
      <div class="radar-stage" id="radarStage">
        <div class="radar" id="radar"><div class="cross-h"></div><div class="cross-v"></div><div class="ring"></div><div class="beam"></div><div class="core"></div></div>
      </div>
      <div class="map-hud">
        <div class="hud-scan" id="hudScan"><span class="sp"></span><span id="hudScanTxt">Scanne …</span></div>
        <div class="hud-chip">Im letzten Scan: <b id="scanCount">0</b></div>
        <div class="hud-chip" id="hudRegion">—</div>
      </div>
      <div class="legend">
        <b>Potenzial</b>
        <div class="lg-row"><span class="lg-dot" style="background:#3DDC97"></span>A — vollständige Kontaktdaten</div>
        <div class="lg-row"><span class="lg-dot" style="background:#5FA0DC"></span>B — teilweise erreichbar</div>
        <div class="lg-row"><span class="lg-dot" style="background:#8DA2BC"></span>C — nur Name/Adresse</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ════════════════════════════════════════════════
   LeadRadar v3 — Sektor-Scan · Potenzial-Ranking · stoppbar
   Daten © OpenStreetMap-Mitwirkende (ODbL)
════════════════════════════════════════════════ */
const map=L.map('map',{preferCanvas:true,zoomControl:true}).setView([48.6,9.2],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © CARTO',
  subdomains:'abcd',maxZoom:19}).addTo(map);

let leads=JSON.parse(localStorage.getItem('wwLeads')||'[]');
let markers={};let activeId=null;let filterQ='';
let scanning=false,stopFlag=false,aborter=null;
const LIST_CAP=400;
const CHAINS=/engel\s*&\s*v[öo]lkers|re\/?max|von\s*poll|mc\s*makler|homeday|dahler|sotheby|immoscout|planethome|falc\s*immobilien|garant\s*immo|deutsche\s*bank|sparkassen?-?immo|volksbank|raiffeisen|ubs\b|postfinance|z[üu]rcher\s*kantonalbank/i;

const $=id=>document.getElementById(id);
const list=$('list'),statusEl=$('status'),statusTxt=$('statusTxt');

/* ── Potenzial-Score ── */
function score(l){
  let s=0;
  if(l.email)s+=45;
  if(l.phone)s+=25;
  if(l.web)s+=20;
  if(l.addr&&l.addr.includes(','))s+=10;
  return s;
}
const tier=l=>{const s=score(l);return s>=70?'A':s>=25?'B':'C'};
const TIER_COL={A:'#3DDC97',B:'#5FA0DC',C:'#8DA2BC'};
const TIER_TXT={
  A:'<b>Potenzial A — sofort ansprechbar.</b> E-Mail hinterlegt: kleines Büro, digital erreichbar, ideal für deine Automatisierungen. Direkt anschreiben.',
  B:'<b>Potenzial B — gut erreichbar.</b> Telefon/Webseite vorhanden: E-Mail steht meist im Impressum der Webseite. Kurz nachschauen, dann anschreiben oder anrufen.',
  C:'<b>Potenzial C — Recherche nötig.</b> Nur Name/Adresse hinterlegt. Name + Ort googeln, wenn die Region strategisch interessant ist.'
};

/* ── Overpass ── */
const OVERPASS=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
async function overpass(q,signal){
  let lastErr;
  for(const url of OVERPASS){
    try{
      const r=await fetch(url,{method:'POST',body:'data='+encodeURIComponent(q),signal,
        headers:{'Content-Type':'application/x-www-form-urlencoded'}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      return (await r.json()).elements||[];
    }catch(e){if(e.name==='AbortError')throw e;lastErr=e}
  }
  throw lastErr;
}
const qBox=b=>`[out:json][timeout:45];
(node["office"="estate_agent"](${b[0]},${b[1]},${b[2]},${b[3]});
 way["office"="estate_agent"](${b[0]},${b[1]},${b[2]},${b[3]}););
out center tags;`;
const qCity=(lat,lon,rad)=>`[out:json][timeout:60];
(node["office"="estate_agent"](around:${rad},${lat},${lon});
 way["office"="estate_agent"](around:${rad},${lat},${lon}););
out center tags;`;

/* ── Lead-Aufbereitung ── */
function toLead(el,regionName){
  const t=el.tags||{};
  const lat=el.lat??el.center?.lat,lon=el.lon??el.center?.lon;
  if(!lat||!t.name)return null;
  const addr=[[t['addr:street'],t['addr:housenumber']].filter(Boolean).join(' '),
    [t['addr:postcode'],t['addr:city']].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  return{id:el.type+'_'+el.id,name:t.name,addr:addr||regionName,
    phone:t['contact:phone']||t.phone||'',email:t['contact:email']||t.email||'',
    web:t['contact:website']||t.website||'',lat,lon,region:regionName,contacted:false,ts:Date.now()};
}
/* neu einfügen ODER bestehenden aktualisieren (Refresh) */
function upsert(l){
  const ex=leads.find(x=>x.id===l.id);
  if(ex){
    let changed=false;
    ['phone','email','web','addr','name'].forEach(k=>{if(l[k]&&l[k]!==ex[k]){ex[k]=l[k];changed=true}});
    if(changed&&markers[ex.id]){markers[ex.id].setStyle(mkStyle(ex,ex.id===activeId))}
    return changed?'upd':'dup';
  }
  leads.push(l);addMarker(l);return 'new';
}

/* ── Marker ── */
function mkStyle(l,sel){
  return{radius:sel?9:(tier(l)==='A'?7:5),weight:sel?2.5:1.3,color:'#fff',
    fillColor:l.contacted?'#1FA76F':TIER_COL[tier(l)],fillOpacity:.95};
}
function addMarker(l){
  if(markers[l.id])return;
  const m=L.circleMarker([l.lat,l.lon],mkStyle(l,false)).addTo(map).bindPopup(()=>popupHtml(l));
  m.on('click',()=>selectLead(l.id,false));
  markers[l.id]=m;
}
function popupHtml(l){
  const esc=s=>String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  let h=`<div class="pop-nm">${esc(l.name)} <span class="pot ${tier(l)}">${tier(l)}</span></div><div class="pop-ad">${esc(l.addr)}</div>`;
  if(l.phone)h+=`<div class="pop-row"><svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h2.3l1.4 4-2 1.3a12 12 0 0 0 5.3 5.3l1.3-2 4 1.4V19a2 2 0 0 1-2 2A16 16 0 0 1 4 5z"/></svg>${esc(l.phone)}</div>`;
  if(l.email)h+=`<div class="pop-row"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg><a href="mailto:${esc(l.email)}">${esc(l.email)}</a></div>`;
  if(l.web){const u=l.web.startsWith('http')?l.web:'https://'+l.web;
    h+=`<div class="pop-row"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg><a href="${esc(u)}" target="_blank" rel="noopener">${esc(l.web.replace(/^https?:\/\//,''))}</a></div>`;}
  if(!l.phone&&!l.email&&!l.web)h+=`<div class="pop-row" style="color:#5F7590">Keine Kontaktdaten hinterlegt — Name + Ort googeln.</div>`;
  h+=`<div class="pop-pot">${TIER_TXT[tier(l)]}</div>`;
  h+=`<button class="pop-mail" onclick="window.open(gmailUrl(leads.find(x=>x.id==='${l.id}')),'_blank')">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
    Akquise-Mail in Gmail öffnen</button>`;
  return h;
}

/* ── Liste (sortiert nach Potenzial) ── */
function fLeads(){
  let fl=leads;
  if(filterQ){const q=filterQ.toLowerCase();
    fl=fl.filter(l=>(l.name+' '+l.addr+' '+l.region).toLowerCase().includes(q))}
  return [...fl].sort((a,b)=>score(b)-score(a)||a.name.localeCompare(b.name));
}
const SVG_TEL='<svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h2.3l1.4 4-2 1.3a12 12 0 0 0 5.3 5.3l1.3-2 4 1.4V19a2 2 0 0 1-2 2A16 16 0 0 1 4 5z"/></svg>';
const SVG_MAIL='<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
const SVG_WEB='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>';
function leadHtml(l,idx){
  const esc=s=>String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const tags=[];
  if(l.phone)tags.push('<span class="tg ok">'+SVG_TEL+'Tel</span>');
  if(l.email)tags.push('<span class="tg ok">'+SVG_MAIL+'Mail</span>');
  if(l.web)tags.push('<span class="tg ok">'+SVG_WEB+'Web</span>');
  if(!tags.length)tags.push('<span class="tg">nur Name/Adresse</span>');
  return `<div class="lead${l.id===activeId?' active':''}" data-id="${l.id}" style="animation-delay:${Math.min(idx*25,300)}ms">
    <div class="top-row"><span class="pot ${tier(l)}">${tier(l)}</span><span class="nm">${esc(l.name)}</span></div>
    <div class="ad">${esc(l.addr)}${l.region?' · '+esc(l.region):''}</div>
    <div class="tags">${tags.join('')}
      <button class="tg ok mailquick" data-mailto="${l.id}" title="Akquise-Mail in Gmail öffnen">${SVG_MAIL}Mail verfassen</button>
    </div>
    <button class="mark${l.contacted?' done':''}" data-mark="${l.id}">${l.contacted?'✓ erledigt':'offen'}</button>
  </div>`;
}
function renderList(){
  const fl=fLeads();
  $('totalCount').textContent=leads.length;
  $('doneCount').textContent=leads.filter(l=>l.contacted).length;
  $('aCount').textContent=leads.filter(l=>tier(l)==='A').length;
  if(!fl.length){
    list.innerHTML=`<div class="empty">
      <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="13"/><path d="M16 16l7-5M16 3v4M16 25v4M3 16h4M25 16h4"/></svg>
      ${leads.length?'Kein Treffer für deine Suche.':'Noch keine Leads.<br>Wähle „Ganze Schweiz" oder „Ganz Deutschland"<br>und starte den Scan.'}</div>`;
    return;
  }
  const shown=fl.slice(0,LIST_CAP);
  list.innerHTML=shown.map((l,i)=>leadHtml(l,i)).join('')+
    (fl.length>LIST_CAP?`<div class="more-hint">… und ${fl.length-LIST_CAP} weitere (nach Potenzial sortiert) — Suche nutzen.</div>`:'');
}
$('q').addEventListener('input',e=>{filterQ=e.target.value.trim();renderList()});

list.addEventListener('click',e=>{
  const ml=e.target.closest('[data-mailto]');
  if(ml){const l=leads.find(x=>x.id===ml.dataset.mailto);
    if(l)window.open(gmailUrl(l),'_blank');
    e.stopPropagation();return}
  const mk=e.target.closest('[data-mark]');
  if(mk){const id=mk.dataset.mark;const l=leads.find(x=>x.id===id);
    if(l){l.contacted=!l.contacted;save();renderList();
      if(markers[id])markers[id].setStyle(mkStyle(l,id===activeId));}
    e.stopPropagation();return}
  const card=e.target.closest('.lead');
  if(card)selectLead(card.dataset.id,true);
});
function selectLead(id,fly){
  const prev=activeId;activeId=id;
  const l=leads.find(x=>x.id===id);if(!l)return;
  if(prev&&markers[prev]){const pl=leads.find(x=>x.id===prev);if(pl)markers[prev].setStyle(mkStyle(pl,false))}
  if(markers[id]){markers[id].setStyle(mkStyle(l,true));markers[id].openPopup()}
  if(fly)map.flyTo([l.lat,l.lon],Math.max(map.getZoom(),14),{duration:.8});
  renderList();
  const el=list.querySelector(`[data-id="${id}"]`);if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* ── Radar ── */
function radarAt(latlng,radiusM){
  const stage=$('radarStage'),radar=$('radar');
  const update=()=>{
    const c=map.latLngToContainerPoint(latlng);
    const edge=map.latLngToContainerPoint(L.latLng(latlng.lat,latlng.lng+radiusM/(111320*Math.cos(latlng.lat*Math.PI/180))));
    const r=Math.max(Math.abs(edge.x-c.x),110);
    radar.style.width=radar.style.height=(r*2)+'px';
    radar.style.left=(c.x-r)+'px';radar.style.top=(c.y-r)+'px';
  };
  update();stage.classList.add('on');
  map.on('move zoom',update);
  stage._cleanup=()=>{map.off('move zoom',update);stage.classList.remove('on')};
}
function radarOff(){const s=$('radarStage');if(s._cleanup)s._cleanup()}

/* ── Scan-Steuerung (Start/Stopp) ── */
function setScanUI(on){
  scanning=on;
  const btn=$('btnScan');
  btn.classList.toggle('stop',on);btn.classList.toggle('scanning',on);
  $('btnTxt').textContent=on?'Scan stoppen':'Scan starten';
  $('btnIco').innerHTML=on?'<rect x="7" y="7" width="10" height="10" rx="2" fill="#fff" stroke="none"/>'
    :'<circle cx="12" cy="12" r="9"/><path d="M12 12L18 7"/><circle cx="12" cy="12" r="1" fill="#fff"/>';
  statusEl.classList.toggle('busy',on);
  $('scanmeta').classList.toggle('on',on);
  $('hudScan').classList.toggle('on',on);
  if(!on)radarOff();
}
$('btnScan').addEventListener('click',()=>{
  if(scanning){stopFlag=true;if(aborter)aborter.abort();statusTxt.textContent='Scan wird gestoppt …';return}
  startScan();
});

async function startScan(){
  const val=$('selRegion').value;
  const onlySmall=$('chkSmall').checked,onlyContact=$('chkContact').checked;
  stopFlag=false;
  let neu=0,upd=0,total=0,name;
  setScanUI(true);
  const t0=Date.now();
  const tick=setInterval(()=>{
    $('hudScanTxt').textContent='Scanne '+name+' … '+Math.round((Date.now()-t0)/1000)+'s';
  },500);

  const processEls=(els,region)=>{
    for(const el of els){
      const l=toLead(el,region);if(!l)continue;
      total++;
      if(onlySmall&&CHAINS.test(l.name))continue;
      if(onlyContact&&!l.phone&&!l.email&&!l.web)continue;
      const r=upsert(l);
      if(r==='new')neu++;else if(r==='upd')upd++;
    }
    save();renderList();
    $('scanCount').textContent=neu;
  };

  try{
    if(val.startsWith('CC:')){
      /* ── Ländescan in Sektoren ── */
      const cc=val.split(':')[1];const S=SECTORS[cc];name=S.name;
      $('hudRegion').textContent=name;
      map.flyTo(S.center,S.zoom,{duration:1.2});
      const n=S.boxes.length;
      for(let i=0;i<n;i++){
        if(stopFlag)break;
        const b=S.boxes[i];
        const c=L.latLng((b[0]+b[2])/2,(b[1]+b[3])/2);
        const radM=Math.max((b[2]-b[0])*111320/2,(b[3]-b[1])*111320*Math.cos(c.lat*Math.PI/180)/2);
        radarOff();radarAt(c,radM);
        $('smLabel').textContent='Sektor '+(i+1)+' von '+n+' — '+name;
        $('smPct').textContent=Math.round(i/n*100)+'%';$('smBar').style.width=(i/n*100)+'%';
        statusTxt.textContent='Scanne Sektor '+(i+1)+'/'+n+' … '+neu+' Leads bisher';
        aborter=new AbortController();
        try{
          const els=await overpass(qBox(b),aborter.signal);
          processEls(els,name);
        }catch(e){
          if(e.name==='AbortError')break;
          statusTxt.textContent='Sektor '+(i+1)+' übersprungen (Server ausgelastet) — weiter …';
          await new Promise(r=>setTimeout(r,1500));
        }
      }
      $('smPct').textContent='100%';$('smBar').style.width='100%';
    }else{
      /* ── Stadt-Scan ── */
      const[lat,lon,n2]=val.split(',');name=n2;
      const rad=name==='Zürich'||name==='Basel'||name==='Bern'||name==='Genf'?25000:30000;
      $('hudRegion').textContent=name;
      map.flyTo([+lat,+lon],10,{duration:1});
      $('smLabel').textContent=name;$('smPct').textContent='…';$('smBar').style.width='40%';
      radarAt(L.latLng(+lat,+lon),rad);
      aborter=new AbortController();
      const els=await overpass(qCity(lat,lon,rad),aborter.signal);
      processEls(els,name);
      $('smBar').style.width='100%';
    }
    const secs=Math.round((Date.now()-t0)/1000);
    statusTxt.textContent=stopFlag
      ?`Scan gestoppt nach ${secs}s — ${neu} neue Leads, nach Potenzial sortiert.`
      :`Scan abgeschlossen (${secs}s): ${total} Büros geprüft · ${neu} neu · ${upd} aktualisiert. Sortiert nach Potenzial.`;
    toast(stopFlag?`■ Gestoppt — ${neu} neue Leads`:`✓ ${name}: ${neu} neue Leads, ${upd} aktualisiert`);
  }catch(err){
    statusTxt.textContent='Abfrage fehlgeschlagen — kurz warten und erneut starten.';
    toast('⚠ Abfrage fehlgeschlagen — gleich nochmal versuchen');
  }
  clearInterval(tick);
  setScanUI(false);
}

/* ── CSV / Clear / Save ── */
function save(){
  try{localStorage.setItem('wwLeads',JSON.stringify(leads))}
  catch(e){toast('⚠ Speicher voll — als CSV exportieren und Liste leeren')}
}
$('btnCsv').addEventListener('click',()=>{
  if(!leads.length)return toast('Keine Leads zum Exportieren');
  const esc=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
  const sorted=fLeads();
  const rows=[['Potenzial','Name','Adresse','Region','Telefon','E-Mail','Webseite','Kontaktiert'].join(';')]
    .concat(sorted.map(l=>[tier(l),l.name,l.addr,l.region,l.phone,l.email,l.web,l.contacted?'ja':'nein'].map(esc).join(';')));
  const blob=new Blob(["﻿"+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='walter-workflows-leads.csv';a.click();
  toast('✓ CSV heruntergeladen (nach Potenzial sortiert)');
});
$('btnClear').addEventListener('click',()=>{
  if(!leads.length)return;
  if(!confirm('Wirklich alle '+leads.length+' Leads löschen?'))return;
  leads=[];save();
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  activeId=null;renderList();$('scanCount').textContent=0;
  toast('Liste geleert');
});
let toastTimer;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),4000)}

/* ── Init ── */
leads.forEach(addMarker);renderList();
if(leads.length)statusTxt.textContent=leads.length+' gespeicherte Leads geladen — sortiert nach Potenzial.';
</script>
